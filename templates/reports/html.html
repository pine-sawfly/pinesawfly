<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f2f4f8;
      color: #1e2a3a;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }
    .report-container {
      max-width: 1180px;
      margin: 36px auto;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 20px 38px -20px rgba(15, 23, 42, 0.35);
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 34px 42px;
      background: linear-gradient(135deg, #0b2b3b 0%, #1a4b6e 100%);
      color: white;
    }
    .header h1 { margin: 0; font-size: 30px; font-weight: 700; }
    .header p { margin: 6px 0 0; opacity: 0.78; }
    .logo { width: 64px; height: 64px; object-fit: contain; }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      padding: 22px 42px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .info-label {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .info-value {
      display: block;
      margin-top: 4px;
      color: #0f172a;
      font-size: 15px;
      word-break: break-all;
    }
    .content { padding: 28px 42px 40px; }
    .summary {
      margin: 0 0 28px;
      padding: 22px 26px;
      border-left: 6px solid #eab308;
      border-radius: 18px;
      background: #fefce8;
    }
    .summary h2, .affected h2, .snippets h2 {
      margin: 0 0 14px;
      color: #0f172a;
      font-size: 21px;
    }
    .stats { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
    .stat-badge {
      padding: 7px 16px;
      border-radius: 999px;
      background: white;
      font-weight: 700;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }
    .critical { background: #7f1d1d; color: white; }
    .high { background: #b91c1c; color: white; }
    .medium { background: #eab308; color: #1e1b2e; }
    .low { background: #2b6e4f; color: white; }
    .info { background: #dbeafe; color: #1e40af; }
    .finding {
      margin: 26px 0;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      overflow: hidden;
      background: white;
    }
    .finding-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 26px;
      border-bottom: 1px solid #edf2f7;
      background: #f8fafc;
    }
    .finding-kicker {
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .finding h2 { margin: 4px 0 0; font-size: 21px; }
    .risk-tag {
      align-self: flex-start;
      padding: 6px 14px;
      border-radius: 999px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 13px;
      font-weight: 800;
    }
    .finding-body { padding: 22px 26px 26px; }
    .finding-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin: 0 0 18px;
    }
    .finding-meta div { padding: 12px 14px; border-radius: 14px; background: #f8fafc; }
    dt { color: #64748b; font-size: 12px; font-weight: 700; }
    dd { margin: 4px 0 0; color: #0f172a; word-break: break-all; }
    .finding-section h3, .code-card h3 {
      margin: 18px 0 8px;
      font-size: 16px;
      color: #0f172a;
    }
    pre {
      margin: 10px 0 0;
      padding: 16px;
      border-radius: 14px;
      background: #0f172a;
      color: #e2e8f0;
      overflow-x: auto;
      white-space: pre-wrap;
      font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
    }
    pre span { display: block; }
    pre .hit {
      margin: 0 -8px;
      padding: 0 8px;
      border-radius: 8px;
      background: rgba(244, 67, 54, 0.26);
    }
    pre b {
      display: inline-block;
      min-width: 42px;
      margin-right: 10px;
      color: #94a3b8;
      font-weight: 500;
    }
    .affected {
      margin: 32px 0;
      padding: 22px 26px;
      border-radius: 18px;
      background: #f8fafc;
    }
    .affected ul { margin: 0; padding-left: 20px; }
    .code-card { margin: 22px 0; }
    .footer {
      padding: 22px 42px;
      color: #64748b;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <main class="report-container">
    <header class="header">
      {{ logo }}
      <div>
        <h1>{{ title }}</h1>
        <p>PineSawFly 代码审计报告</p>
      </div>
    </header>

    <section class="info-grid">
      {{ author }}
      {{ project_path }}
      {{ generated_at }}
    </section>

    <section class="content">
      {{ overview }}

      <h2>审计详情与发现</h2>
      {{ findings }}

      {{ affected_locations }}

      {{ highlighted_code_snippets }}
    </section>

    <footer class="footer">由 PineSawFly 生成。报告内容应结合人工复核后用于修复决策。</footer>
  </main>
</body>

</html>
